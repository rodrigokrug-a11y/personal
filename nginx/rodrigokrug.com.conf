# nginx — rodrigokrug.com → redireciona para rodrigokrug.com.br
#
# O .com.br é o domínio oficial. Quem acessar o .com é levado ao .com.br
# (evita conteúdo duplicado / melhor para SEO).
#
# Instalação no VPS:
#   cp nginx/rodrigokrug.com.conf /etc/nginx/sites-available/rodrigokrug.com
#   ln -s /etc/nginx/sites-available/rodrigokrug.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# HTTPS do .com (necessário p/ redirecionar acessos https://rodrigokrug.com):
#   certbot --nginx -d rodrigokrug.com -d www.rodrigokrug.com \
#     --non-interactive --agree-tos -m rodrigokrug@gmail.com

server {
    listen 80;
    listen [::]:80;
    server_name rodrigokrug.com www.rodrigokrug.com;

    # Redireciona tudo para o domínio oficial, preservando o caminho.
    return 301 https://rodrigokrug.com.br$request_uri;
}
