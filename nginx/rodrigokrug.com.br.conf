# nginx — rodrigokrug.com.br → app Node (pm2 "personal") em 127.0.0.1:4321
#
# Instalação no VPS:
#   cp nginx/rodrigokrug.com.br.conf /etc/nginx/sites-available/rodrigokrug.com.br
#   ln -s /etc/nginx/sites-available/rodrigokrug.com.br /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# O HTTPS é adicionado depois pelo certbot:
#   certbot --nginx -d rodrigokrug.com.br -d www.rodrigokrug.com.br

server {
    listen 80;
    listen [::]:80;
    server_name rodrigokrug.com.br www.rodrigokrug.com.br;

    # Tamanho de upload (imagens enviadas pelo editor /keystatic).
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
